<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:lang="${#locale.language}"
      th:dir="${#locale.language == 'ar'} ? 'rtl' : 'ltr'">
<head th:replace="~{fragments/head :: head(${#messages.msg('nav.categories')})}"></head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar('categories')}"></div>

    <div class="main-col">
        <div th:replace="~{fragments/topbar :: topbar(#{app.name}, #{nav.categories})}"></div>

        <div class="content">
            <div class="card table-card">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th th:text="#{category.name}">Name</th>
                        <th th:text="#{category.nameAr}">Arabic name</th>
                        <th th:text="#{category.slug}">Slug</th>
                        <th th:text="#{category.type}">Type</th>
                        <th th:text="#{category.status}">Home status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c : ${categories}">
                        <td th:text="${c.name}">Name</td>
                        <td th:text="${c.nameAr}">Arabic name</td>
                        <td><code th:text="${c.slug}">slug</code></td>
                        <td th:text="${c.type}">Type</td>
                        <td>
                            <span th:if="${c.statusHome != null and c.statusHome.name() == 'active'}" class="badge-pill badge-active" th:text="#{estate.active}">Active</span>
                            <span th:if="${c.statusHome == null or c.statusHome.name() == 'disactive'}" class="badge-pill badge-disactive" th:text="#{estate.disactive}">Inactive</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
