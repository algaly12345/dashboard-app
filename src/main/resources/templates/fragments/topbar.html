<div th:fragment="topbar(eyebrow, title)" class="topbar">
    <div>
        <div class="page-eyebrow" th:text="${eyebrow}">Section</div>
        <h1 th:text="${title}">Title</h1>
    </div>
    <div class="d-flex align-items-center gap-2">
        <div class="lang-switch">
            <a th:href="@{${currentUri}(lang='ar')}"
               th:classappend="${#locale.language == 'ar'} ? 'active' : ''">عربي</a>
            <a th:href="@{${currentUri}(lang='en')}"
               th:classappend="${#locale.language != 'ar'} ? 'active' : ''">EN</a>
        </div>

        <!-- Notifications -->
        <div class="nav-dropdown">
            <button type="button" class="nav-icon-btn" data-dropdown-toggle="notif-dropdown">
                <i class="bi bi-bell"></i>
                <span th:if="${navNewEstatesCount > 0}" class="nav-icon-badge" th:text="${navNewEstatesCount > 9} ? '9+' : ${navNewEstatesCount}">0</span>
            </button>
            <div id="notif-dropdown" class="nav-dropdown-menu">
                <div class="nav-dropdown-header">
                    <span th:text="#{nav.notifBell.title}">New listings</span>
                    <span class="badge-pill badge-tour" th:if="${navNewEstatesCount > 0}" th:text="${navNewEstatesCount} + ' ' + #{nav.notifBell.today}">0 today</span>
                </div>
                <div class="nav-dropdown-body">
                    <a th:each="e : ${navRecentEstates}" th:href="@{'/estates/' + ${e.id}}" class="nav-dropdown-item">
                        <div class="thumb-fallback" style="width:36px; height:36px; flex-shrink:0;"><i class="bi bi-building"></i></div>
                        <div class="min-w-0">
                            <div class="nav-dropdown-item-title" th:text="${e.shortDescription}">Title</div>
                            <div class="nav-dropdown-item-sub">
                                <span th:text="${e.city}">City</span> ·
                                <span th:text="${e.createdAt != null ? #temporals.format(e.createdAt, 'MM-dd HH:mm') : ''}">-</span>
                            </div>
                        </div>
                    </a>
                    <div th:if="${navRecentEstates.isEmpty()}" class="text-muted small text-center py-3" th:text="#{nav.notifBell.empty}">No listings yet</div>
                </div>
                <a th:href="@{/estates}" class="nav-dropdown-footer" th:text="#{dashboard.viewAll}">View all</a>
            </div>
        </div>

        <!-- Profile -->
        <div class="nav-dropdown">
            <button type="button" class="nav-icon-btn nav-profile-btn" data-dropdown-toggle="profile-dropdown">
                <i class="bi bi-person-fill"></i>
            </button>
            <div id="profile-dropdown" class="nav-dropdown-menu nav-dropdown-menu-sm">
                <div class="nav-dropdown-header">
                    <span th:text="${currentAdminName} ?: #{nav.profile.admin}">Admin</span>
                </div>
                <div class="nav-dropdown-body py-1">
                    <a th:href="@{/profile}" class="nav-dropdown-item">
                        <i class="bi bi-person-circle"></i>
                        <span th:text="#{nav.profile.view}">My profile</span>
                    </a>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="nav-dropdown-item w-100 border-0 bg-transparent text-start">
                            <i class="bi bi-box-arrow-right"></i>
                            <span th:text="#{nav.logout}">Sign out</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function () {
        if (window.__navDropdownInit) return;
        window.__navDropdownInit = true;
        document.addEventListener('click', function (e) {
            var toggle = e.target.closest('[data-dropdown-toggle]');
            document.querySelectorAll('.nav-dropdown-menu.open').forEach(function (menu) {
                if (!toggle || menu.id !== toggle.getAttribute('data-dropdown-toggle')) {
                    menu.classList.remove('open');
                }
            });
            if (toggle) {
                var menu = document.getElementById(toggle.getAttribute('data-dropdown-toggle'));
                if (menu) menu.classList.toggle('open');
            }
        });
    })();
</script>
