<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:lang="${#locale.language}"
      th:dir="${#locale.language == 'ar'} ? 'rtl' : 'ltr'">
<head th:replace="~{fragments/head :: head(${#messages.msg('login.title')})}"></head>
<body>

<div class="login-shell">
    <div class="login-art">
        <div class="seal"></div>
        <div class="seal s2"></div>
        <blockquote>
            <span th:if="${#locale.language == 'ar'}">
                كل صك، وكل حي، وكل إعلان — في مكان واحد تديره بثقة.
            </span>
            <span th:unless="${#locale.language == 'ar'}">
                Every deed, every district, every listing — managed with confidence from one screen.
            </span>
            <br/><cite th:text="#{brand.tagline}">Real Estate Back Office</cite>
        </blockquote>
    </div>

    <div class="login-panel">
        <div class="login-card">
            <div class="lang-switch mb-4" style="width:fit-content;">
                <a th:href="@{/login(lang='ar')}" th:classappend="${#locale.language == 'ar'} ? 'active' : ''">عربي</a>
                <a th:href="@{/login(lang='en')}" th:classappend="${#locale.language != 'ar'} ? 'active' : ''">EN</a>
            </div>

            <div class="brand-mark">E</div>
            <h2 class="mb-1" th:text="#{login.title}">Sign in to Estate Control</h2>
            <p class="text-muted mb-4" th:text="#{login.subtitle}">Manage listings, agents and providers in one place.</p>

            <div th:if="${param.error}" class="alert alert-danger py-2 small" th:text="#{login.error}">Error</div>
            <div th:if="${param.logout}" class="alert alert-success py-2 small" th:text="#{login.logout}">Logged out</div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label small fw-semibold" th:text="#{login.username}">Email or phone</label>
                    <input type="text" name="username" class="form-control" required autofocus/>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-semibold" th:text="#{login.password}">Password</label>
                    <input type="password" name="password" class="form-control" required/>
                </div>
                <button type="submit" class="btn btn-gold w-100" th:text="#{login.submit}">Sign in</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
